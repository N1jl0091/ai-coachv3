<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Coach · Observability</title>
<style>
  body {
    margin: 0;
    background: #0b0d10;
    color: #e6edf3;
    font-family: ui-monospace, "JetBrains Mono", SFMono-Regular, Menlo, monospace;
    display: grid;
    place-items: center;
    min-height: 100vh;
    padding: 24px;
  }
  .card {
    border: 1px solid #243039;
    background: #141a21;
    border-radius: 6px;
    padding: 32px 40px;
    max-width: 520px;
    text-align: center;
  }
  .dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #6ee7b7;
    margin-right: 10px;
    box-shadow: 0 0 12px #6ee7b7;
    transform: translateY(-1px);
  }
  h1 { font-size: 16px; letter-spacing: 1px; margin: 0 0 8px; }
  p { color: #8b96a3; font-size: 13px; line-height: 1.6; margin: 8px 0; }
  code { color: #6ee7b7; }
</style>
</head>
<body>
  <div class="card">
    <h1><span class="dot"></span>AI COACH · OBSERVABILITY</h1>
    <p>Dashboard placeholder.</p>
    <p>The first scheduled flush will replace this page with live metrics drawn from <code>docs/logs.json</code>.</p>
  </div>
</body>
</html>
